<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        to bottom,
        #1f022e,
        #0c0114,
        #050008
      );
      overflow: hidden;
    }

    /* Главный контейнер (Окно-кнопка) */
    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      background-color: #3b124d;
      border: 2px solid #5d1f7a;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 20px rgba(93, 31, 122, 0.25);
    }

    /* Эффект при наведении на закрытое окно */
    .main-container:not(.expanded):hover {
      background-color: #48185e;
      box-shadow: 0 0 30px rgba(121, 40, 158, 0.5);
    }

    /* Развернутое состояние контейнера */
    .main-container.expanded {
      width: 97%;
      height: 95vh;
      min-height: 95vh;
      cursor: default;
      padding: 0; 
      text-align: left;
      box-shadow: none;
      
      display: flex;
      overflow: hidden;
    }

    /* Стартовый текст */
    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 32px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) --- */
    .sidebar {
      width: 80px;
      background-color: #4f1b66; 
      border-right: 2px solid #5d1f7a;
      height: 100%;
      box-sizing: border-box;
      padding: 20px 0;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    /* Контейнер-обертка для иконки и её подсказки */
    .sidebar-item-wrapper {
      position: relative; /* Чтобы подсказка позиционировалась относительно этого элемента */
      display: flex;
      align-items: center;
    }

    /* --- КНОПКА ДОМА --- */
    .home-button {
      width: 50px;
      height: 50px;
      background-color: #6a248a;
      border-radius: 50%; /* Всегда круглая */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      
      /* Добавляем transform в плавный переход */
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .home-button svg {
      width: 26px;
      height: 26px;
      fill: #e2c7f5; 
      transition: fill 0.2s ease;
    }

    /* Эффект при наведении: легкое увеличение и смена цвета */
    .home-button:hover {
      background-color: #5d1f7a; 
      transform: scale(1.1); /* Увеличение размера на 10% */
    }

    .home-button:hover svg {
      fill: #ffffff;
    }

    /* --- ВСПЛЫВАЮЩЕЕ ОКНО (ТУЛТИП) --- */
    .sidebar-tooltip {
      position: absolute;
      left: 65px; /* Отодвигаем вправо от иконки */
      white-space: nowrap; /* Запрещаем тексту переноситься на новую строку */
      
      /* Цвет темнее основного окна (#3b124d) */
      background-color: #22052e; 
      border: 1px solid #420d59;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      
      /* Изначально скрываем окно подсказки */
      opacity: 0;
      visibility: hidden;
      transform: translateX(-10px); /* Легкое смещение для эффекта "выплывания" */
      
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 10; /* Отображается поверх контента справа */
    }

    /* Маленький стрелочка-указатель (уголок) у всплывающего окна */
    .sidebar-tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background-color: #22052e;
      border-left: 1px solid #420d59;
      border-bottom: 1px solid #420d59;
    }

    /* Показываем окно с названием при наведении на элемент сайдбара */
    .sidebar-item-wrapper:hover .sidebar-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    /* --- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) --- */
    .content-wrapper {
      flex: 1;
      padding: 30px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    /* Общая обертка для плавной анимации появления содержимого */
    .content-layout {
      display: flex;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(15px);
      transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
    }

    /* Активация анимации появления при раскрытии */
    .main-container.expanded .content-layout {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .content-wrapper h1 {
      margin-top: 0;
      font-size: 40px;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .content-wrapper p {
      font-size: 18px;
      color: #e2c7f5;
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <p class="click-to-open">Click to open</p>

    <div class="content-layout">
      
      <aside class="sidebar">
        
        <div class="sidebar-item-wrapper">
          
          <div class="home-button">
            <svg viewBox="0 0 24 24">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </div>

          <div class="sidebar-tooltip">Base info</div>

        </div>

      </aside>

      <main class="content-wrapper">
        <h1>Hi</h1>
        <p>This is my test site on GitHub Pages.</p>
      </main>

    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');

    container.addEventListener('click', function(e) {
      if (!container.classList.contains('expanded')) {
        container.classList.add('expanded');
      }
    });
  </script>
</body>
</html>
