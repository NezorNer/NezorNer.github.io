<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        to bottom,
        #1f022e,
        #0c0114,
        #050008
      );
      overflow: hidden;
    }

    /* Главный контейнер (Окно-кнопка) */
    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      background-color: #3b124d;
      border: 2px solid #5d1f7a;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 20px rgba(93, 31, 122, 0.25);
    }

    /* Эффект при наведении на закрытое окно */
    .main-container:not(.expanded):hover {
      background-color: #48185e;
      box-shadow: 0 0 30px rgba(121, 40, 158, 0.5);
    }

    /* Развернутое состояние контейнера */
    .main-container.expanded {
      width: 97%;
      height: 95vh;
      min-height: 95vh;
      cursor: default;
      padding: 0; 
      text-align: left;
      box-shadow: none;
      
      display: flex;
      overflow: hidden;
    }

    /* Стартовый текст */
    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 32px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) --- */
    .sidebar {
      width: 80px;
      background-color: #4f1b66; 
      border-right: 2px solid #5d1f7a;
      height: 100%;
      box-sizing: border-box;
      padding: 20px 0;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    /* Контейнер-обертка для иконки и её подсказки */
    .sidebar-item-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* --- КНОПКА ДОМА --- */
    .home-button {
      width: 50px;
      height: 50px;
      background-color: #6a248a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .home-button svg {
      width: 26px;
      height: 26px;
      fill: #e2c7f5; 
      transition: fill 0.2s ease;
    }

    .home-button:hover {
      background-color: #5d1f7a; 
      transform: scale(1.1);
    }

    .home-button:hover svg {
      fill: #ffffff;
    }

    /* --- ВСПЛЫВАЮЩЕЕ ОКНО (ТУЛТИП) --- */
    .sidebar-tooltip {
      position: absolute;
      left: 65px;
      white-space: nowrap;
      
      background-color: #22052e; 
      border: 1px solid #420d59;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      
      opacity: 0;
      visibility: hidden;
      transform: translateX(-10px);
      
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 10;
    }

    .sidebar-tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background-color: #22052e;
      border-left: 1px solid #420d59;
      border-bottom: 1px solid #420d59;
    }

    .sidebar-item-wrapper:hover .sidebar-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    /* --- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) --- */
    .content-wrapper {
      flex: 1;
      padding: 30px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    /* Общая обертка для плавной анимации появления содержимого */
    .content-layout {
      display: flex;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(15px);
      transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
    }

    /* Активация анимации появления при раскрытии */
    .main-container.expanded .content-layout {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Стилизация вывода псевдо-консоли */
    .console-log {
      margin: 0 0 12px 0;
      font-size: 18px;
      line-height: 24px;
      color: #e2c7f5;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Класс, который делает строчку лога видимой через JS */
    .console-log.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Акцент на системные теги консоли */
    .console-log .status-ok {
      color: #00b06f;
    }
    .console-log .status-warn {
      color: #ffaa00;
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <!-- Кнопка открытия -->
    <p class="click-to-open">Click to open</p>

    <!-- Внутреннее устройство сайта -->
    <div class="content-layout">
      
      <!-- ЛЕВАЯ ПАНЕЛЬ -->
      <aside class="sidebar">
        
        <div class="sidebar-item-wrapper">
          
          <div class="home-button">
            <svg viewBox="0 0 24 24">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </div>

          <div class="sidebar-tooltip">Base info</div>

        </div>

      </aside>

      <!-- ПРАВАЯ ЧАСТЬ (ТЕКСТ УБРАН) -->
      <main class="content-wrapper" id="consoleOutput">
        <!-- Сюда скрипт будет последовательно выводить строки загрузки -->
      </main>

    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');
    const consoleOutput = document.getElementById('consoleOutput');

    // Массив строк, которые будут имитировать загрузку консоли
    const logLines = [
      'Connecting to Meossy secure server... <span class="status-ok">SUCCESS</span>',
      'Fetching repository metadata... Done',
      'Loading interface components... <span class="status-ok">OK</span>',
      'Decrypting user profile info... <span class="status-warn">98%</span>',
      'System initialization completed.'
    ];

    container.addEventListener('click', function(e) {
      if (!container.classList.contains('expanded')) {
        container.classList.add('expanded');
        
        // Запускаем процесс логирования ровно через 1000мс после клика 
        // (когда анимация раскрытия окна гарантированно завершится)
        setTimeout(startConsoleLoading, 1000);
      }
    });

    function startConsoleLoading() {
      let currentLine = 0;

      function printNextLine() {
        if (currentLine < logLines.length) {
          // Создаем новый элемент абзаца для строки лога
          const p = document.createElement('p');
          p.className = 'console-log';
          p.innerHTML = `> ${logLines[currentLine]}`;
          consoleOutput.appendChild(p);

          // Делаем микро-задержку для анимации появления строки через CSS
          setTimeout(() => {
            p.classList.add('visible');
          }, 50);

          currentLine++;
          // Интервал между появлением новых строчек логов (500 миллисекунд)
          setTimeout(printNextLine, 500);
        } else {
          // Когда все строки напечатаны, ждем 1.5 секунды и очищаем экран
          setTimeout(clearConsole, 1500);
        }
      }

      printNextLine();
    }

    function clearConsole() {
      const elements = consoleOutput.querySelectorAll('.console-log');
      
      // Плавно скрываем все элементы консоли назад
      elements.forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-5px)';
        el.style.transition = 'all 0.4s ease';
      });

      // Полностью удаляем их из HTML структуры после завершения анимации исчезновения
      setTimeout(() => {
        consoleOutput.innerHTML = '';
        // Логи исчезли. Окно готово для вставки будущей финальной информации!
      }, 400);
    }
  </script>
</body>
</html>
