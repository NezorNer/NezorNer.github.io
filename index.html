<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        to bottom,
        #1f022e,
        #0c0114,
        #050008
      );
      overflow: hidden;
    }

    /* Главный контейнер (Окно-кнопка) */
    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      background-color: #3b124d;
      border: 2px solid #5d1f7a;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 20px rgba(93, 31, 122, 0.25);
    }

    /* Эффект при наведении на закрытое окно */
    .main-container:not(.expanded):hover {
      background-color: #48185e;
      box-shadow: 0 0 30px rgba(121, 40, 158, 0.5);
    }

    /* Развернутое состояние контейнера */
    .main-container.expanded {
      width: 97%;
      height: 95vh;
      min-height: 95vh;
      cursor: default;
      padding: 0; 
      text-align: left;
      box-shadow: none;
      
      display: flex;
      overflow: hidden;
    }

    /* --- СТАРТОВЫЙ ТЕКСТ --- */
    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 32px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) --- */
    .sidebar {
      width: 80px;
      background-color: #4f1b66; 
      border-right: 2px solid #5d1f7a;
      height: 100%;
      box-sizing: border-box;
      padding: 20px 0;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .sidebar-item-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* --- КНОПКА ДОМА --- */
    .home-button {
      width: 50px;
      height: 50px;
      background-color: #6a248a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .home-button svg {
      width: 26px;
      height: 26px;
      fill: #e2c7f5; 
      transition: fill 0.2s ease;
    }

    .home-button:hover {
      background-color: #5d1f7a; 
      transform: scale(1.1);
    }

    .home-button:hover svg {
      fill: #ffffff;
    }

    /* --- ТУЛТИП --- */
    .sidebar-tooltip {
      position: absolute;
      left: 65px;
      white-space: nowrap;
      background-color: #22052e; 
      border: 1px solid #420d59;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      opacity: 0;
      visibility: hidden;
      transform: translateX(-10px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 10;
    }

    .sidebar-tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background-color: #22052e;
      border-left: 1px solid #420d59;
      border-bottom: 1px solid #420d59;
    }

    .sidebar-item-wrapper:hover .sidebar-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    /* --- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) --- */
    .content-wrapper {
      flex: 1;
      padding: 25px;
      box-sizing: border-box;
      overflow-y: auto;
      scroll-behavior: smooth; 
      position: relative;
    }

    /* Общая обертка контента */
    .content-layout {
      display: flex;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(15px);
      transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
    }

    .main-container.expanded .content-layout {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* --- СТИЛИ КОНСОЛИ --- */
    #consoleOutput {
      width: 100%;
      height: 100%;
    }

    .console-log {
      margin: 0 0 4px 0;   
      font-size: 13px;     
      line-height: 16px;   
      color: #e2c7f5;
      word-break: break-all;
    }

    .console-log .status-ok { color: #00b06f; }
    .console-log .status-warn { color: #ffaa00; }


    /* --- СТРУКТУРА НОВЫХ ОКН --- */
    .final-interface {
      display: none; 
      flex-direction: column;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    .final-interface.visible {
      opacity: 1;
    }

    /* Приветственное окно (Верхнее) */
    .welcome-box {
      height: 30%; 
      margin-top: 15px; 
      background-color: #2b083a; 
      border: 2px solid #5d1f7a; /* Обводка теперь как у главного окна */
      border-radius: 18px;
      box-sizing: border-box;
    }

    /* Секция под приветственным окном */
    .bottom-section {
      display: flex;
      flex: 1; 
      margin-top: 20px; 
      gap: 20px;
      min-height: 0; 
      margin-bottom: 5px;
    }

    /* Левое пространство для анкеты */
    .left-spacer {
      flex: 4; 
      display: flex;
      flex-direction: column;
      justify-content: center; /* Центрирование по вертикали */
      align-items: center;     /* Центрирование по горизонтали */
      box-sizing: border-box;
      padding: 10px;
    }

    /* Стилизация анкетного блока */
    .profile-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-size: 16px;
      letter-spacing: 0.5px;
      width: 100%;
      max-width: 280px; /* Чтобы строки стояли ровно друг под другом */
    }

    .profile-form p {
      margin: 0;
      line-height: 20px;
    }

    .form-label {
      color: #ffffff;
    }

    .form-value {
      color: #a47cb8; /* Временный цвет для ваших будущих ответов */
    }

    /* Правое окно */
    .right-box {
      flex: 6; 
      background-color: #2b083a;
      border: 2px solid #5d1f7a; /* Обводка теперь как у главного окна */
      border-radius: 18px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <p class="click-to-open">Click to open</p>

    <div class="content-layout">
      
      <!-- ЛЕВАЯ ПАНЕЛЬ -->
      <aside class="sidebar">
        <div class="sidebar-item-wrapper">
          <div class="home-button">
            <svg viewBox="0 0 24 24">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </div>
          <div class="sidebar-tooltip">Base info</div>
        </div>
      </aside>

      <!-- ПРАВАЯ ЧАСТЬ -->
      <main class="content-wrapper">
        
        <!-- Блок вывода консоли -->
        <div id="consoleOutput"></div>

        <!-- Блок нового интерфейса -->
        <div id="finalInterface" class="final-interface">
          
          <!-- Верхнее окно приветствия -->
          <div class="welcome-box"></div>
          
          <!-- Нижняя зона разметки -->
          <div class="bottom-section">
            
            <!-- Левое пространство с Анкетой -->
            <div class="left-spacer">
              <div class="profile-form">
                <p><span class="form-label">_Nickname:</span> <span class="form-value">Meossy</span></p>
                <p><span class="form-label">_Gender:</span> <span class="form-value">Bi</span></p>
                <p><span class="form-label">_Age:</span> <span class="form-value">18</span></p>
                <p><span class="form-label">_Hobby:</span>
              </div>
            </div> 

            <!-- Правое окно -->
            <div class="right-box"></div>   
          </div>

        </div>

      </main>

    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');
    const consoleOutput = document.getElementById('consoleOutput');
    const finalInterface = document.getElementById('finalInterface');

    const logLines = [
      'INITIALIZING MEOSSY-CORE TERMINAL V2.4.0-RELEASE...',
      '[ INFO ] Checking kernel integrity sub-sectors... <span class="status-ok">SECURE</span>',
      '[ INFO ] Loading system architecture environment variables... Done',
      '[ LINK ] Establishing secure handshake with GitHub Remote API...',
      '[ LINK ] Tunneling traffic through local SSL proxy gateway... <span class="status-ok">CONNECTED</span>',
      '[ DB ] Mounting virtual memory block sequences... 0x7FFF8A20',
      '[ DB ] Allocating static local cache for "Base Info" module...',
      '[ INFO ] Parsing central configuration asset: ./config.json... OK',
      '[ INFO ] Optimizing application layout engine (Flexbox active)...',
      '[ WARN ] Font file "Terminus-Bold.ttf" loaded from cache. <span class="status-warn">CACHED</span>'
    ];

    container.addEventListener('click', function(e) {
      if (!container.classList.contains('expanded')) {
        container.classList.add('expanded');
        setTimeout(startConsoleLoading, 1000);
      }
    });

    function startConsoleLoading() {
      let currentLine = 0;

      function printNextLine() {
        if (currentLine < logLines.length) {
          typeLine(logLines[currentLine], consoleOutput, () => {
            currentLine++;
            setTimeout(printNextLine, 80);
          });
        } else {
          setTimeout(clearConsole, 1500);
        }
      }

      printNextLine();
    }

    function typeLine(lineText, container, callback) {
      const p = document.createElement('p');
      p.className = 'console-log';
      p.innerHTML = '>&nbsp;'; 
      container.appendChild(p);

      let i = 0;
      function type() {
        if (i < lineText.length) {
          if (lineText[i] === '<') {
            let closingTagIdx = lineText.indexOf('>', i);
            if (closingTagIdx !== -1) {
              p.innerHTML = '>&nbsp;' + lineText.substring(0, closingTagIdx + 1);
              i = closingTagIdx + 1;
            } else {
              p.innerHTML = '>&nbsp;' + lineText.substring(0, i + 1);
              i++;
            }
          } else {
            p.innerHTML = '>&nbsp;' + lineText.substring(0, i + 1);
            i++;
          }
          
          const wrapper = consoleOutput.parentElement;
          wrapper.scrollTop = wrapper.scrollHeight;
          
          setTimeout(type, 10); 
        } else {
          callback();
        }
      }
      type();
    }

    function clearConsole() {
      const elements = consoleOutput.querySelectorAll('.console-log');
      
      elements.forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-5px)';
        el.style.transition = 'all 0.4s ease';
      });

      setTimeout(() => {
        consoleOutput.style.display = 'none';
        finalInterface.style.display = 'flex';
        
        setTimeout(() => {
          finalInterface.classList.add('visible');
        }, 50);
        
      }, 400);
    }
  </script>
</body>
</html>
