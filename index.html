<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        to bottom,
        #1d0029,
        #07000a,
        #000000
      );
      overflow: hidden;
    }

    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      background-color: #2b083a;
      border: 2px solid #420d59;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 15px rgba(66, 13, 89, 0.3);
    }

    .main-container:not(.expanded):hover {
      background-color: #380b4c;
      box-shadow: 0 0 25px rgba(110, 20, 148, 0.5);
    }

    .main-container.expanded {
      width: 97%;
      min-height: 95vh;
      cursor: default;
      padding: 24px;
      text-align: left;
      box-shadow: none;
    }

    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 26px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    .content {
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity 0.5s ease 0.4s, transform 0.5s ease 0.4s, visibility 0.5s ease 0.4s;
    }

    .main-container.expanded .content {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <p class="click-to-open">Click to open</p>

    <div class="content">
      <h1>Hi</h1>
      <p>This is my test site on GitHub Pages.</p>
    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');

    container.addEventListener('click', function() {
      if (!container.classList.contains('expanded')) {
        container.classList.add('expanded');
      }
    });
  </script>
</body>
</html>
