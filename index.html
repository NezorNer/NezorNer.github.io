<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Чуть более насыщенный и мягкий градиент на фоне */
      background: linear-gradient(
        to bottom,
        #1f022e,
        #0c0114,
        #050008
      );
      overflow: hidden;
    }

    /* Главный контейнер (Окно-кнопка) */
    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      /* Изменили цвет на более приятный, благородный фиолетовый */
      background-color: #3b124d;
      border: 2px solid #5d1f7a;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 20px rgba(93, 31, 122, 0.25);
    }

    /* Эффект при наведении на закрытое окно */
    .main-container:not(.expanded):hover {
      background-color: #48185e;
      box-shadow: 0 0 30px rgba(121, 40, 158, 0.5);
    }

    /* Развернутое состояние контейнера */
    .main-container.expanded {
      width: 97%;
      height: 95vh;
      min-height: 95vh;
      cursor: default;
      /* Убираем внутренние отступы самого контейнера, */
      /* чтобы сайдбар прилегал вплотную к краям */
      padding: 0; 
      text-align: left;
      box-shadow: none;
      
      /* Используем flex для выстраивания сайдбара и контента в ряд */
      display: flex;
      overflow: hidden; /* Чтобы скругленные углы контейнера обрезали внутренние блоки */
    }

    /* Стартовый текст */
    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 32px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) в стиле Discord --- */
    .sidebar {
      width: 80px; /* Фиксированная ширина под иконки-"сервера" */
      /* Делаем сайдбар заметно ярче основного фона окна */
      background-color: #4f1b66; 
      border-right: 2px solid #5d1f7a;
      height: 100%;
      box-sizing: border-box;
      padding: 20px 0;
      
      /* Флекс-контейнер для будущих круглых иконок в столбик */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px; /* Расстояние между будущими вкладками */
    }

    /* Временная заглушка для иконки, чтобы вы видели, где они будут располагаться */
    .sidebar-placeholder-icon {
      width: 50px;
      height: 50px;
      background-color: #6a248a;
      border-radius: 50%; /* Круглая как в Discord */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
      opacity: 0.7;
    }

    /* --- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) --- */
    .content-wrapper {
      flex: 1; /* Занимает всё оставшееся пространство справа от сайдбара */
      padding: 30px;
      box-sizing: border-box;
      overflow-y: auto; /* Если текста будет много, появится прокрутка только внутри этой зоны */
    }

    /* Общая обертка для плавной анимации появления содержимого */
    .content-layout {
      display: flex;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(15px);
      transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
    }

    /* Активация анимации появления при раскрытии */
    .main-container.expanded .content-layout {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Стилизация заголовков и текста для лучшей читаемости на новом фоне */
    .content-wrapper h1 {
      margin-top: 0;
      font-size: 40px;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
    
    .content-wrapper p {
      font-size: 18px;
      color: #e2c7f5; /* Слегка сиреневый оттенок для обычного текста */
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <p class="click-to-open">Click to open</p>

    <div class="content-layout">
      
      <aside class="sidebar">
        <div class="sidebar-placeholder-icon">M</div>
      </aside>

      <main class="content-wrapper">
        <h1>Hi</h1>
        <p>This is my test site on GitHub Pages.</p>
      </main>

    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');

    container.addEventListener('click', function(e) {
      // Клик сработает на раскрытие только если контейнер закрыт
      if (!container.classList.contains('expanded')) {
        container.classList.add('expanded');
      }
    });
  </script>
</body>
</html>
