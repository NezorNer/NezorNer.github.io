<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Meossy's site</title>

  <style>
    @font-face {
      font-family: 'Terminus';
      src: url('Terminus-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    body {
      font-family: 'Terminus', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        to bottom,
        #1f022e,
        #0c0114,
        #050008
      );
      overflow: hidden;
    }

    /* Главный контейнер (Окно-кнопка) */
    .main-container {
      width: 450px;
      height: 65px;
      max-width: 3000px;
      min-height: 65px;
      background-color: #3b124d;
      border: 2px solid #5d1f7a;
      border-radius: 24px;
      box-sizing: border-box;
      padding: 15px;
      color: #ffffff;
      cursor: pointer;
      text-align: center;
      
      transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      
      box-shadow: 0 0 20px rgba(93, 31, 122, 0.25);
    }

    /* Эффект при наведении на закрытое окно */
    .main-container:not(.expanded):hover {
      background-color: #48185e;
      box-shadow: 0 0 30px rgba(121, 40, 158, 0.5);
    }

    /* Развернутое состояние контейнера */
    .main-container.expanded {
      width: 97%;
      height: 95vh;
      min-height: 95vh;
      cursor: default;
      padding: 0; 
      text-align: left;
      box-shadow: none;
      
      display: flex;
      overflow: hidden;
    }

    /* Стартовый текст */
    .click-to-open {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
      opacity: 1;
      transition: opacity 0.3s ease;
      line-height: 32px;
    }
    .main-container.expanded .click-to-open {
      display: none;
    }

    /* --- ЛЕВАЯ ПАНЕЛЬ (SIDEBAR) --- */
    .sidebar {
      width: 80px;
      background-color: #4f1b66; 
      border-right: 2px solid #5d1f7a;
      height: 100%;
      box-sizing: border-box;
      padding: 20px 0;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    /* Контейнер-обертка для иконки и её подсказки */
    .sidebar-item-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* --- КНОПКА ДОМА --- */
    .home-button {
      width: 50px;
      height: 50px;
      background-color: #6a248a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .home-button svg {
      width: 26px;
      height: 26px;
      fill: #e2c7f5; 
      transition: fill 0.2s ease;
    }

    .home-button:hover {
      background-color: #5d1f7a; 
      transform: scale(1.1);
    }

    .home-button:hover svg {
      fill: #ffffff;
    }

    /* --- ВСПЛЫВАЮЩЕЕ ОКНО (ТУЛТИП) --- */
    .sidebar-tooltip {
      position: absolute;
      left: 65px;
      white-space: nowrap;
      
      background-color: #22052e; 
      border: 1px solid #420d59;
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      
      opacity: 0;
      visibility: hidden;
      transform: translateX(-10px);
      
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      z-index: 10;
    }

    .sidebar-tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background-color: #22052e;
      border-left: 1px solid #420d59;
      border-bottom: 1px solid #420d59;
    }

    .sidebar-item-wrapper:hover .sidebar-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    /* --- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) --- */
    .content-wrapper {
      flex: 1;
      padding: 25px;
      box-sizing: border-box;
      overflow-y: auto;
      /* Плавный скролл при автоматической прокрутке вниз */
      scroll-behavior: smooth; 
    }

    /* Общая обертка для плавной анимации появления содержимого */
    .content-layout {
      display: flex;
      width: 100%;
      height: 100%;
      opacity: 0;
      visibility: hidden;
      transform: translateY(15px);
      transition: opacity 0.6s ease 0.4s, transform 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
    }

    .main-container.expanded .content-layout {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    /* Стилизация компактной консоли */
    .console-log {
      margin: 0 0 4px 0;   /* Минимальный отступ между строками */
      font-size: 13px;     /* Уменьшенный размер текста */
      line-height: 16px;   /* Компактная высота строки */
      color: #e2c7f5;
      word-break: break-all;
    }

    /* Акцент на системные теги консоли */
    .console-log .status-ok {
      color: #00b06f;
    }
    .console-log .status-warn {
      color: #ffaa00;
    }
  </style>
</head>
<body>

  <div class="main-container" id="mainContainer">
    
    <p class="click-to-open">Click to open</p>

    <div class="content-layout">
      
      <aside class="sidebar">
        <div class="sidebar-item-wrapper">
          <div class="home-button">
            <svg viewBox="0 0 24 24">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
          </div>
          <div class="sidebar-tooltip">Base info</div>
        </div>
      </aside>

      <main class="content-wrapper" id="consoleOutput"></main>

    </div>

  </div>

  <script>
    const container = document.getElementById('mainContainer');
    const consoleOutput = document.getElementById('consoleOutput');

    // Массив из 20 подробных строк загрузки
    const logLines = [
      'INITIALIZING MEOSSY-CORE TERMINAL V2.4.0-RELEASE...',
      '[ INFO ] Checking kernel integrity sub-sectors... <span class="status-ok">SECURE</span>',
      '[ INFO ] Loading system architecture environment variables... Done',
      '[ LINK ] Establishing secure handshake with GitHub Remote API...',
      '[ LINK ] Tunneling traffic through local SSL proxy gateway... <span class="status-ok">CONNECTED</span>',
      '[ DB ] Mounting virtual memory block sequences... 0x7FFF8A20',
      '[ DB ] Allocating static local cache for "Base Info" module...',
      '[ INFO ] Parsing central configuration asset: ./config.json... OK',
      '[ INFO ] Optimizing application layout engine (Flexbox active)...',
      '[ WARN ] Font file "Terminus-Bold.ttf" loaded from cache. <span class="status-warn">CACHED</span>',
      '[ INFO ] Verifying master cryptographic SSH signatures... Valid',
      '[ LOAD ] Injecting global styling matrix from module: layout.css...',
      '[ LOAD ] Compiling asynchronous client runtime scripts... 100%',
      '[ INFO ] Syncing Discord-style responsive sidebar constraints...',
      '[ INFO ] Attaching hardware-accelerated listeners to .home-button...',
      '[ INFO ] Pre-calculating z-index collision layers for tooltips...',
      '[ DB ] Fetching compressed server payload metrics from cluster...',
      '[ INFO ] Unpacking structural nodes: text/html, text/css, image/svg...',
      '[ STATUS ] Hypervisor boot finished with 0 critical errors and 1 warning.',
      '[ READY ] Environment setup complete. Mounting user payload interface...'
    ];

  container.addEventListener('click', function(e) {
    if (!container.classList.contains('expanded')) {
      container.classList.add('expanded');
      // Запуск через 1000мс после клика (окно полностью открыто)
      setTimeout(startConsoleLoading, 1000);
    }
  });

  function startConsoleLoading() {
    let currentLine = 0;

    function printNextLine() {
      if (currentLine < logLines.length) {
        // Запускаем побуквенную печать для текущей строки
        typeLine(logLines[currentLine], consoleOutput, () => {
          currentLine++;
          // Небольшая задержка перед началом печати следующей строки (80мс)
          setTimeout(printNextLine, 80);
        });
      } else {
        // Когда все 20 строк напечатались, ждем 2 секунды перед очисткой
        setTimeout(clearConsole, 2000);
      }
    }

    printNextLine();
  }

  // Функция побуквенного вывода, защищенная от разрыва HTML-тегов (<span...>)
  function typeLine(lineText, container, callback) {
    const p = document.createElement('p');
    p.className = 'console-log';
    p.innerHTML = '>&nbsp;'; // Префикс консоли
    container.appendChild(p);

    let i = 0;
    function type() {
      if (i < lineText.length) {
        // Если натыкаемся на тег (например, <span...>), печатаем его целиком мгновенно, чтобы не ломать разметку
        if (lineText[i] === '<') {
          let closingTagIdx = lineText.indexOf('>', i);
          if (closingTagIdx !== -1) {
            p.innerHTML = '>&nbsp;' + lineText.substring(0, closingTagIdx + 1);
            i = closingTagIdx + 1;
          } else {
            p.innerHTML = '>&nbsp;' + lineText.substring(0, i + 1);
            i++;
          }
        } else {
          // Обычный символ печатаем пошагово
          p.innerHTML = '>&nbsp;' + lineText.substring(0, i + 1);
          i++;
        }
        
        // Автопрокрутка контейнера вниз по мере добавления букв
        container.scrollTop = container.scrollHeight;
        
        // Скорость печати букв (10мс). Можно увеличить, если хотите медленнее.
        setTimeout(type, 10); 
      } else {
        callback();
      }
    }
    type();
  }

  function clearConsole() {
    const elements = consoleOutput.querySelectorAll('.console-log');
    
    // Плавное растворение строк вверх при очистке
    elements.forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(-5px)';
      el.style.transition = 'all 0.4s ease';
    });

    setTimeout(() => {
      consoleOutput.innerHTML = '';
      // Консоль успешно очищена, окно полностью готово к вашей будущей информации!
    }, 400);
  }
  </script>
</body>
</html>
